default_config:

demo:

debugpy:
  start: true
  wait: false

logger:
  default: warning
  logs:
    custom_components.advanced_cover: debug

# Fixtures for exercising time_based_positioning: the demo: covers all
# support SET_POSITION, so these template covers stand in for a "dumb"
# open/close/stop-only cover.
input_boolean:
  fake_shade_is_open:
    name: Fake Shade Is Open

template:
  - cover:
      - device_class: shutter
        open_cover:
          - target:
              entity_id:
                - input_boolean.fake_shade_is_open
            action: input_boolean.turn_on
        close_cover:
          - target:
              entity_id:
                - input_boolean.fake_shade_is_open
            action: input_boolean.turn_off
        stop_cover:
          - data:
              message: "fake_shade_no_position: stop_cover received"
              level: warning
            action: system_log.write
        default_entity_id: cover.fake_shade_no_position
        state: "{{ is_state('input_boolean.fake_shade_is_open', 'on') }}"
        name: Shutter with no position support
        unique_id: fake_shade_no_position

      - device_class: shade
        open_cover:
          - target:
              entity_id:
                - input_boolean.fake_shade_is_open
            action: input_boolean.turn_on
        close_cover:
          - target:
              entity_id:
                - input_boolean.fake_shade_is_open
            action: input_boolean.turn_off
        default_entity_id: cover.fake_shade_no_stop
        state: "{{ is_state('input_boolean.fake_shade_is_open', 'on') }}"
        name: Shutter with no stop support
        unique_id: fake_shade_no_stop
