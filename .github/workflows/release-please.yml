name: release-please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  attach-zip:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Zip the advanced_cover component
        # HACS zip-release convention: the asset must be named
        # <domain>.zip with the component's files at the zip root
        # (not nested in an advanced_cover/ folder).
        run: |
          cd custom_components/advanced_cover
          zip -r "${GITHUB_WORKSPACE}/advanced_cover.zip" . -x '__pycache__/*'

      - name: Upload zip to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" advanced_cover.zip --clobber
